version: '3.8'

services:
  # Web application service
  web:
    build: .
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ledgerflow?replicaSet=rs0
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_started
      mongo-init:
        condition: service_completed_successfully

  # Redis store service
  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  # Database replica service
  mongodb:
    image: mongo:6.0
    restart: unless-stopped
    command: mongod --replSet rs0 --bind_ip_all
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Bootstrap database service
  mongo-init:
    image: mongo:6.0
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: [
      "mongosh", "--host", "mongodb:27017", "--eval",
      "try { rs.status() } catch (e) { rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongodb:27017'}]}) }"
    ]

volumes:
  mongo-data:
  redis-data:
